<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="rainbow12b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="17%" stop-color="#f59e0b"/>
      <stop offset="33%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="67%" stop-color="#a855f7"/>
      <stop offset="83%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background rainbow arc (like a halo) -->
  <path d="M 18 70 A 50 50 0 0 1 102 70" fill="none" stroke="url(#rainbow12b)" stroke-width="10" stroke-linecap="round" opacity="0.85"/>

  <!-- Robot body -->
  <rect x="42" y="62" width="36" height="30" rx="10" fill="#d97706"/>

  <!-- Robot head -->
  <rect x="46" y="38" width="28" height="24" rx="8" fill="#f59e0b"/>

  <!-- Eyes -->
  <circle cx="55" cy="50" r="4" fill="#fff"/>
  <circle cx="65" cy="50" r="4" fill="#fff"/>
  <circle cx="55" cy="50" r="2" fill="#1c1917"/>
  <circle cx="65" cy="50" r="2" fill="#1c1917"/>

  <!-- Antenna -->
  <line x1="60" y1="38" x2="60" y2="26" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="22" r="5" fill="#ec4899"/>

  <!-- Small palette in hand -->
  <ellipse cx="86" cy="74" rx="12" ry="7" fill="#f5f0e8" stroke="#d4c8b8" stroke-width="1.2" transform="rotate(-25 86 74)"/>
  <circle cx="82" cy="71" r="2" fill="#dc2626"/>
  <circle cx="86" cy="69" r="2" fill="#f59e0b"/>
  <circle cx="90" cy="72" r="2" fill="#22c55e"/>
  <circle cx="88" cy="76" r="2" fill="#3b82f6"/>

  <!-- Arm -->
  <line x1="76" y1="68" x2="82" y2="72" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M54 58 Q60 62 66 58" stroke="#1c1917" stroke-width="1.8" stroke-linecap="round" fill="none"/>
</svg>